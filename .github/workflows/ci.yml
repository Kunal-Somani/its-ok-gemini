name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      - name: Run Ruff
        run: ruff check app/
        
      - name: Run Pytest
        run: pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build frontend
        run: npm run build
        
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker-build:
    runs-on: ubuntu-22.04
    needs: [lint-and-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build backend Dockerfile
        run: docker build -t its-ok-gemini-backend:${{ github.sha }} .
        
      - name: Build frontend Dockerfile
        run: docker build -t its-ok-gemini-frontend:${{ github.sha }} ./frontend
