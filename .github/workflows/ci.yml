name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        continue-on-error: false
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        continue-on-error: false
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        continue-on-error: false
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      - name: Run Ruff Format Check
        continue-on-error: false
        run: ruff format app/ tests/ --check
        
      - name: Run Ruff
        continue-on-error: false
        run: ruff check app/ tests/
        
      - name: Type check frontend
        continue-on-error: false
        run: cd frontend && npm ci && npx tsc --noEmit

  test:
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        continue-on-error: false
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        continue-on-error: false
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        continue-on-error: false
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      - name: Run Pytest
        continue-on-error: false
        run: pytest tests/ -v --tb=short --cov=app --cov-fail-under=40

  frontend-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
        continue-on-error: false
      
      - name: Set up Node 20
        uses: actions/setup-node@v4
        continue-on-error: false
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
          
      - name: Install dependencies
        continue-on-error: false
        run: npm ci
        
      - name: Build frontend
        continue-on-error: false
        run: npm run build
        
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        continue-on-error: false
        with:
          name: frontend-dist
          path: frontend/dist/

  docker-build:
    runs-on: ubuntu-22.04
    needs: [lint, test, frontend-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        continue-on-error: false
      
      - name: Build backend Dockerfile
        continue-on-error: false
        run: docker build -t archon-backend:${{ github.sha }} .
        
      - name: Build frontend Dockerfile
        continue-on-error: false
        run: docker build -t archon-frontend:${{ github.sha }} ./frontend
